<!DOCTYPE html>
<html>
<head>
  <title>SniperTrade</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { color: #22c55e; }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #22c55e;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>SNIPERTRADE</h1>
<p>My Trading Dashboard</p>

<div class="card">
  <h3>📊 Watchlist</h3>
  <input id="stockInput" placeholder="Enter stock">
  <button onclick="addStock()">Add</button>
  <ul id="watchlist"></ul>
</div>

<div class="card">
  <h3>📝 Notes</h3>
  <textarea id="notes" rows="4" cols="30"></textarea><br>
  <button onclick="saveNotes()">Save</button>
</div>

<script>
let stocks = [];

function addStock() {
  let input = document.getElementById("stockInput");
  stocks.push(input.value);
  input.value = "";
  displayStocks();
}

function displayStocks() {
  let list = document.getElementById("watchlist");
  list.innerHTML = "";
  stocks.forEach(s => {
    let li = document.createElement("li");
    li.textContent = s;
    list.appendChild(li);
  });
}

function saveNotes() {
  let notes = document.getElementById("notes").value;
  localStorage.setItem("notes", notes);
  alert("Saved!");
}

window.onload = () => {
  document.getElementById("notes").value = localStorage.getItem("notes") || "";
}
</script>

</body>
</html>
